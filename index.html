<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Ganhos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="form">
        <!-- Título da página -->
        <h2 class="titulo">Controle de Entregas</h2>
        
        <!-- Selecionar tipo de ganho -->
        <label class="texto">Tipo:</label>
        <select class="tipo" id="tipo">
            <!-- valor fixo -->
            <option class="tipo" value="fixo">Fixo</option>
            <!-- valor de entrega iFood -->
            <option class="tipo" value="ifood">iFood</option>
        </select>
        
        <!-- Campo para selecionar a data -->
        <label class="texto">Data:</label>
        <input class="data-input" type="date" id="data">
        
        <!-- Campo para valor da entrega -->
        <label class="texto">Valor:</label>
        <input type="number" id="valor">
        
        <!-- Campos de endereço -->
        <label class="texto">Rua / Avenida:</label>
        <input type="text" id="rua">
        
        <label class="texto">Bairro:</label>
        <input type="text" id="bairro">
        
        <label class="texto">Cidade:</label>
        <input type="text" id="cidade">
        
        <!-- Botão que chama a função principal -->
        <button type="button" onclick="adicionarEntrega()">Adicionar</button>
    </form>
        <div class="totais">

            <!-- Área de totais -->
            <h3 class="totais-titulo">Totais:</h3>
            
            <p class="informacao">Total Fixo: R$ <span id="totalFixo">0</span></p>
            <p class="informacao">Total iFood: R$ <span id="totalIfood">0</span></p>
            <p class="informacao">Total Geral: R$ <span id="totalGeral">0</span></p>
            
            
            <!-- Lista de entregas -->
            <h3 class="lista-entregas">Lista de Entregas:</h3>
            <ul id="lista"></ul>
            
        </div>

  <script>

    // Variáveis globais para armazenar os totais
    let totalFixo = 0;
    let totalIfood = 0;

    // Array para guardar dias já usados (evita duplicar fixo)
    let diasRegistrados = [];

    function adicionarEntrega() {

      // Pegando valores dos inputs
      let tipo = document.getElementById("tipo").value;
      let valor = parseFloat(document.getElementById("valor").value);
      let rua = document.getElementById("rua").value;
      let bairro = document.getElementById("bairro").value;
      let cidade = document.getElementById("cidade").value;
      let data = document.getElementById("data").value;

     

      

      // Verifica se a data foi preenchida
      if (!data) {
        alert("Selecione uma data!");
        return;
      }

      // Descobre o dia da semana (0 = domingo, 6 = sábado)
      let dia = new Date(data + "T00:00:00").getDay();

      let valorFixoDia = 0;

      // Define o valor fixo baseado no dia
      if (dia >= 1 && dia <= 5) {
        valorFixoDia = 30; // semana
      } else {
        valorFixoDia = 50; // fim de semana
      }

     // Evita somar o fixo mais de uma vez no mesmo dia
       if (tipo === "fixo") {
  if (!diasRegistrados.includes(data)) {
    totalFixo += valorFixoDia;
    diasRegistrados.push(data);
  }
}



      
      
     

      // Validação dos campos
      if (!valor || !rua || !bairro || !cidade) {
        alert("Preencha todos os campos!");
        return;
      }

      // Soma baseado no tipo escolhido
      if (tipo === "fixo") {
        totalFixo += valor;
      } else {
        totalIfood += valor;
      }

      // Criar item da lista
      let lista = document.getElementById("lista");
      let item = document.createElement("li");

      // Texto exibido
      item.innerText = `${tipo.toUpperCase()} - R$ ${valor.toFixed(2)} | ${rua}, ${bairro} - ${cidade}`;

      // Adiciona na lista
      lista.appendChild(item);

      // Atualiza totais na tela
      atualizarTotais();

      // Limpa os campos
      limparCampos();
    }

    // Atualiza os números na tela
    function atualizarTotais() {
      document.getElementById("totalFixo").innerText = totalFixo.toFixed(2);
      document.getElementById("totalIfood").innerText = totalIfood.toFixed(2);
      document.getElementById("totalGeral").innerText = (totalFixo + totalIfood).toFixed(2);
    }

    // Limpa os inputs
    function limparCampos() {
      document.getElementById("valor").value = "";
      document.getElementById("rua").value = "";
      document.getElementById("bairro").value = "";
      document.getElementById("cidade").value = "";

      
    }

  </script>

</body>
</html>
