<script>
let totalFixo = 0;
let totalIfood = 0;
let diasRegistrados = [];
let entregas = [];

// 🔥 CARREGAR AO ABRIR
window.onload = function () {
  let dados = localStorage.getItem("entregas");

  if (dados) {
    entregas = JSON.parse(dados);

    entregas.forEach(e => {
      adicionarNaLista(e);

      if (e.tipo === "fixo") {
        totalFixo += e.valor;
      } else {
        totalIfood += e.valor;
      }
    });

    atualizarTotais();
  }
};

// 🔥 ADICIONAR ENTREGA
function adicionarEntrega() {
  let tipo = document.getElementById("tipo").value;
  let valor = parseFloat(document.getElementById("valor").value) || 0;
  let rua = document.getElementById("rua").value;
  let bairro = document.getElementById("bairro").value;
  let cidade = document.getElementById("cidade").value;
  let data = document.getElementById("data").value;

  if (!data || !valor || !rua || !bairro || !cidade) {
    alert("Preencha todos os campos!");
    return;
  }

  let dia = new Date(data + "T00:00:00").getDay();
  let valorFixoDia = (dia >= 1 && dia <= 5) ? 30 : 50;

  if (tipo === "fixo" && !diasRegistrados.includes(data)) {
    totalFixo += valorFixoDia;
    diasRegistrados.push(data);
  }

  if (tipo === "fixo") {
    totalFixo += valor;
  } else {
    totalIfood += valor;
  }

  let entrega = { tipo, valor, rua, bairro, cidade, data };

  entregas.push(entrega);

  // 💾 SALVA
  localStorage.setItem("entregas", JSON.stringify(entregas));

  adicionarNaLista(entrega);
  atualizarTotais();
  limparCampos();
}

// 🔥 ADICIONAR NA LISTA
function adicionarNaLista(e) {
  let lista = document.getElementById("lista");
  let item = document.createElement("li");

  item.innerText = `${e.tipo.toUpperCase()} - R$ ${e.valor} | ${e.rua}, ${e.bairro} - ${e.cidade}`;

  lista.appendChild(item);
}

// 🔥 ATUALIZAR TOTAIS
function atualizarTotais() {
  document.getElementById("totalFixo").innerText = totalFixo.toFixed(2);
  document.getElementById("totalIfood").innerText = totalIfood.toFixed(2);
  document.getElementById("totalGeral").innerText = (totalFixo + totalIfood).toFixed(2);
}

// 🔥 LIMPAR CAMPOS
function limparCampos() {
  document.getElementById("valor").value = "";
  document.getElementById("rua").value = "";
  document.getElementById("bairro").value = "";
  document.getElementById("cidade").value = "";
}
</script>
